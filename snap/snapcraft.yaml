name: twi
base: core24
grade: stable
confinement: classic
adopt-info: twi
summary: Terminal Twitch chat client
description: |
  twi is a terminal Twitch IRC chat client built with Bubble Tea. It supports
  live multi-channel chat, inline terminal images (Kitty/Ghostty graphics
  protocol), 13 built-in themes plus custom hex palettes, emote autocomplete,
  and Twitch OAuth login.

  Run `twi chat --mock` for a credential-free demo, or `twi setup` for a
  guided path to live chat.

  This snap uses classic confinement (unsandboxed, like a traditional
  package) so it can read/write config, cache, and credential files at their
  normal locations under the real $HOME (e.g. ~/.config/twi,
  ~/.cache/twi) instead of a snap-specific sandboxed data directory, and so
  `twi login` can bind its local OAuth callback listener and launch a
  browser without interface-plug restrictions. Install with
  `snap install twi --classic`.

license: MIT

platforms:
  amd64:
    build-on: [amd64]
    build-for: [amd64]
  arm64:
    build-on: [amd64, arm64]
    build-for: [arm64]

apps:
  twi:
    command: bin/twi

parts:
  twi:
    plugin: go
    source: .
    # core24's golang-go apt package predates go.mod's `toolchain go1.26.4`;
    # with GOTOOLCHAIN=auto that mismatch makes `go version` print a
    # "downloading go1.26.4" message instead of a parseable version string,
    # which fails snapcraft's go-plugin environment check. Source Go from the
    # snap instead, tracking the matching minor release.
    build-snaps:
      - go/1.26/stable
    build-environment:
      - CGO_ENABLED: "0"
      - GOTOOLCHAIN: auto
    override-pull: |
      craftctl default
      craftctl set version="$(git -C "$CRAFT_PART_SRC" describe --tags --always --dirty 2>/dev/null || echo 0.0.0-unknown)"
