name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GOTOOLCHAIN: auto
      TERM: xterm-256color
      XDG_CONFIG_HOME: /tmp/twi-config
      XDG_CACHE_HOME: /tmp/twi-cache
      TWI_TWITCH_USERNAME: ""
      TWI_TWITCH_OAUTH_TOKEN: ""
      TWI_TWITCH_REFRESH_TOKEN: ""
      TWI_TWITCH_CLIENT_ID: ""
      TWI_TWITCH_CLIENT_SECRET: ""
      TWITCH_USERNAME: ""
      TWITCH_ACCESS_TOKEN: ""
      TWITCH_REFRESH_TOKEN: ""
      TWITCH_CLIENT_ID: ""
      TWITCH_CLIENT_SECRET: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Prepare isolated app directories
        run: mkdir -p "$XDG_CONFIG_HOME" "$XDG_CACHE_HOME"

      - name: Build and smoke release artifacts
        run: scripts/release-dry-run.sh --out "$RUNNER_TEMP/twi-release" --targets "linux/amd64 linux/arm64" --skip-docker

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: twi-release-dry-run
          path: ${{ runner.temp }}/twi-release/
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -eu
          release_dir="$RUNNER_TEMP/twi-release"
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "twi $RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG with Linux amd64 and arm64 binaries."
          fi
          gh release upload "$RELEASE_TAG" \
            "$release_dir/twi_linux_amd64" \
            "$release_dir/twi_linux_amd64.sha256" \
            "$release_dir/twi_linux_arm64" \
            "$release_dir/twi_linux_arm64.sha256" \
            --clobber
